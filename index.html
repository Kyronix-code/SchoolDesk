<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
:root{
  --bg:#0f1117;--surface:#1a1f2e;--surface2:#222840;--surface3:#2a3150;
  --border:#2e3656;--accent:#4f8ef7;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --text:#e8eaf0;--text2:#8b93a8;--text3:#4a5270;--r:10px;--r2:14px;
}
[data-theme=light]{
  --bg:#023E8A;--surface:#0353a4;--surface2:#0466c8;--surface3:#0077b6;
  --border:#0096c7;--accent:#90e0ef;--green:#52b788;--amber:#ffd60a;--red:#ff6b6b;
  --text:#ffffff;--text2:#caf0f8;--text3:#90e0ef;
}
.hidden{display:none!important;}
a{color:var(--accent);}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,#1a2540,var(--bg) 60%);}
.auth-box{width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:2rem;}
.auth-logo{text-align:center;margin-bottom:1.5rem;}
.auth-logo .ico{width:52px;height:52px;background:var(--accent);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px;}
.auth-logo h1{font-size:20px;font-weight:700;}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:4px;}
.role-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--r);padding:4px;margin-bottom:1.2rem;}
.role-tab{flex:1;text-align:center;padding:7px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text2);transition:.2s;}
.role-tab.active{background:var(--surface3);color:var(--text);font-weight:600;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.fg input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.fg input:focus{border-color:var(--accent);}
.btn-main{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
.btn-main:hover{opacity:.9;}
.err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}
.link-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;}
.auth-footer{text-align:center;margin-top:12px;font-size:13px;color:var(--text2);}

/* APP */
#app{display:flex;min-height:100vh;}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-head .brand{font-size:15px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.sb-head .uname{font-size:12px;color:var(--text2);margin-top:3px;}
.sb-head .urole{display:inline-block;margin-top:5px;font-size:10px;padding:2px 8px;background:var(--surface3);border-radius:20px;color:var(--accent);font-family:monospace;}
.sb-nav{flex:1;padding:10px 8px;}
.sb-sec{font-size:10px;color:var(--text3);padding:8px 8px 4px;text-transform:uppercase;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:.15s;margin-bottom:2px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--surface2);color:var(--accent);border-left:3px solid var(--accent);padding-left:7px;}
.sb-foot{padding:12px;border-top:1px solid var(--border);}
.btn-out{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
.btn-out:hover{border-color:var(--red);color:var(--red);}
.main{flex:1;overflow-y:auto;}
.page{padding:24px 28px;display:none;}
.page.active{display:block;}
.ptitle{font-size:22px;font-weight:700;margin-bottom:4px;}
.psub{font-size:13px;color:var(--text2);margin-bottom:20px;}

/* MOBILE */
.mob-head{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;}
@media(max-width:768px){
  #app{flex-direction:column;}
  .mob-head{display:flex;}
  .sidebar{position:fixed;top:0;left:-240px;width:240px;height:100vh;z-index:99;transition:left .25s;}
  .sidebar.open{left:0;}
  .mob-overlay.open{display:block;}
  .page{padding:14px 12px;}
  .stats-row{grid-template-columns:repeat(2,1fr)!important;}
}

/* COMPONENTS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;}
.stat-card .sl{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.stat-card .sv{font-size:26px;font-weight:700;}
.stat-card .ss{font-size:11px;color:var(--text2);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px;}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-head h3{font-size:14px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);font-weight:500;}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.b-10,.b-9{background:rgba(34,197,94,.15);color:#4ade80;}
.b-8,.b-7{background:rgba(79,142,247,.15);color:#7ab3f8;}
.b-6,.b-5{background:rgba(245,158,11,.15);color:#fbbf24;}
.b-4,.b-3,.b-2,.b-1{background:rgba(239,68,68,.15);color:#f87171;}
.b-present{background:rgba(34,197,94,.15);color:#4ade80;}
.b-absent{background:rgba(239,68,68,.15);color:#f87171;}
.b-late{background:rgba(245,158,11,.15);color:#fbbf24;}
.av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.av-b{background:rgba(79,142,247,.2);color:var(--accent);}
.av-p{background:rgba(124,58,237,.2);color:#a78bfa;}
.tf{display:flex;align-items:center;gap:9px;}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s;font-weight:500;}
.btn-p{background:var(--accent);border:none;color:#fff;}
.btn-p:hover{opacity:.85;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-g:hover{border-color:var(--accent);color:var(--accent);}
.btn-d{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-d:hover{background:rgba(239,68,68,.1);}
.sel-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.sel-row label{font-size:13px;color:var(--text2);}
select,input[type=date]{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
select:focus,input[type=date]:focus{border-color:var(--accent);}
.gi{width:42px;padding:5px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:monospace;}
.gi:focus{outline:none;border-color:var(--accent);}
.att-btn{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;border:none;transition:.15s;margin-right:5px;}
.flash{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.flash.show{opacity:1;}
.loading{position:fixed;inset:0;background:rgba(15,17,23,.8);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.loading p{color:var(--text2);font-size:14px;}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px;}
.form-card h3{font-size:14px;font-weight:600;margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px;}
.ff label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.ff input,.ff select{width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.ff input:focus,.ff select:focus{border-color:var(--accent);}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:700px;padding:24px;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:16px;}
.modal-close{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text2);cursor:pointer;font-family:inherit;}
.diary-day-head{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;}
.pending-badge{background:rgba(245,158,11,.15);color:#fbbf24;padding:2px 9px;border-radius:20px;font-size:11px;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrap" class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="ico">🏫</div>
      <h1>SchoolDesk</h1>
      <p>School Management System</p>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="role-tabs" id="role-tabs">
        <div class="role-tab active" onclick="setRole('teacher')">Teacher</div>
        <div class="role-tab" onclick="setRole('student')">Student</div>
        <div class="role-tab" onclick="setRole('parent')">Parent</div>
        <div class="role-tab" onclick="setRole('admin')">Admin</div>
      </div>
      <div class="fg"><label>Username (Email)</label><input id="l-user" type="text" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-main" onclick="doLogin()">Sign In</button>
      <div class="err" id="l-err"></div>
      <div class="auth-footer">New student? <button class="link-btn" onclick="showReg()">Register here</button></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="reg-form" class="hidden">
      <div style="margin-bottom:14px;">
        <button class="link-btn" onclick="showLogin()" style="color:var(--text2);">← Back to login</button>
      </div>
      <div class="fg"><label>Email (will be your username)</label><input id="r-email" type="email" placeholder="your@email.com"></div>
      <div class="fg">
        <label>Password <small style="color:var(--text3);">(Uppercase, lowercase, number, symbol e.g. Aabbcc#123)</small></label>
        <input id="r-pass" type="password" placeholder="Aabbcc#123">
      </div>
      <div class="fg"><label>Confirm Password</label><input id="r-pass2" type="password" placeholder="Repeat password"></div>
      <div class="fg">
        <label id="captcha-label">Captcha: Loading...</label>
        <input id="r-captcha" type="text" placeholder="Your answer">
      </div>
      <button class="btn-main" onclick="doRegister()">Create Account</button>
      <div class="err" id="r-err"></div>
    </div>

    <!-- PENDING FORM (after register) -->
    <div id="pending-form" class="hidden">
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:40px;margin-bottom:12px;">⏳</div>
        <h2 style="font-size:18px;margin-bottom:8px;">Account Pending</h2>
        <p style="color:var(--text2);font-size:14px;margin-bottom:16px;">Your account is waiting for admin approval. Please enter your student details.</p>
      </div>
      <div class="fg"><label>Child's Full Name</label><input id="p-name" type="text" placeholder="Ani Hakobyan"></div>
      <div class="fg"><label>Public ID Number (Հnrаyin hamaranishn)</label><input id="p-id" type="text" placeholder="12345678"></div>
      <div class="fg"><label>Date of Birth (DD.MM.YYYY)</label><input id="p-dob" type="text" placeholder="10.10.2010"></div>
      <button class="btn-main" onclick="submitPending()">Submit Details</button>
      <div class="err" id="p-err"></div>
    </div>

    <!-- APPROVED + ADD ANOTHER CHILD -->
    <div id="add-child-form" class="hidden">
      <div style="text-align:center;padding:10px 0 16px;">
        <div style="font-size:36px;margin-bottom:8px;">✅</div>
        <h2 style="font-size:16px;margin-bottom:4px;">Details Submitted!</h2>
        <p style="color:var(--text2);font-size:13px;">Want to add another child?</p>
      </div>
      <div class="fg"><label>Child's Full Name</label><input id="c2-name" type="text" placeholder="Aram Hakobyan"></div>
      <div class="fg"><label>Public ID Number</label><input id="c2-id" type="text" placeholder="12345679"></div>
      <div class="fg"><label>Date of Birth (DD.MM.YYYY)</label><input id="c2-dob" type="text" placeholder="15.03.2012"></div>
      <button class="btn-main" onclick="addAnotherChild()">Add Child</button>
      <div style="margin-top:10px;text-align:center;">
        <button class="link-btn" onclick="showLogin()">Done → Go to Login</button>
      </div>
      <div class="err" id="c2-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- Mobile Header -->
  <div class="mob-head">
    <button onclick="toggleSidebar()" style="background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;">☰</button>
    <span style="font-size:15px;font-weight:700;">🏫 SchoolDesk</span>
    <button onclick="toggleTheme()" id="theme-btn-m" style="background:none;border:1px solid var(--border);border-radius:8px;padding:4px 8px;color:var(--text2);cursor:pointer;font-size:14px;">🌙</button>
  </div>
  <div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="brand">
        🏫 SchoolDesk
        <button onclick="toggleTheme()" id="theme-btn" style="background:none;border:1px solid var(--border);border-radius:8px;padding:3px 8px;color:var(--text2);cursor:pointer;font-size:13px;">🌙</button>
      </div>
      <div class="uname" id="sb-name"></div>
      <div class="urole" id="sb-role"></div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <button class="btn-out" onclick="logout()">← Sign Out</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main"></div>
</div>

<div class="loading hidden" id="loading"><div class="spin"></div><p id="loading-txt">Loading...</p></div>
<div class="flash" id="flash">✓ Saved</div>

<script>
// ===================== CONFIG =====================
const API='$2a$10$Gi.k.77zA4oqHpM7hiWOPu.sz164TIhfB/m5M0o91k2DOfHCi08b6';
const BIN_SCHOOL='69be81f0b7ec241ddc8bb006';
const BIN_GRADES='69be81fdaa77b81da90584f9';
const BIN_ATT='69be81feaa77b81da90584fe';
const BIN_SCHED='69be81efb7ec241ddc8baffe';
const ADMIN_PASS='SchoolAdmin2026';

// ===================== STATE =====================
let DB={users:{},classes:{}};
let SCHED={};
let GRADES={};
let LESSON_INFO={};
let ATT={};
let THEMATIC={};
let PENDING={};
let CU=null; // current user
let selCls=null,selDate='',selSubj=null,selLesson=1;
let currentRole='teacher';

// ===================== UTILS =====================
function $(id){return document.getElementById(id);}
function initials(n){return(n||'').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function getTodayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateToStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function formatDate(s){if(!s)return'—';const d=new Date(s.replace(/-L2$/,''));const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${d.getDate()} ${M[d.getMonth()]}`;}
function showLoad(t='Loading...'){$('loading').classList.remove('hidden');$('loading-txt').textContent=t;}
function hideLoad(){$('loading').classList.add('hidden');}
function flash(){const f=$('flash');f.classList.add('show');setTimeout(()=>f.classList.remove('show'),2000);}
function getSubjs(u){return((u||CU).subject||'').split('&').map(s=>s.trim()).filter(Boolean);}
function getWeekStart(date){const d=new Date(date||new Date());const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return dateToStr(d);}
function dateToLocalStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function getMonthsForYear(ay){
  const[y1,y2]=ay.split('-').map(Number);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const r=[];
  for(let m=8;m<=11;m++)r.push({val:`${y1}-${String(m+1).padStart(2,'0')}`,label:`${M[m]} ${y1}`});
  for(let m=0;m<=5;m++)r.push({val:`${y2}-${String(m+1).padStart(2,'0')}`,label:`${M[m]} ${y2}`});
  return r;
}
function getWeeksOfMonth(monthVal){
  const[year,month]=monthVal.split('-').map(Number);
  const days=[];
  const d=new Date(year,month-1,1);
  while(d.getMonth()===month-1){if(d.getDay()>=1&&d.getDay()<=5)days.push(new Date(d));d.setDate(d.getDate()+1);}
  const weeks=[];let week=[];
  days.forEach(day=>{if(day.getDay()===1&&week.length>0){weeks.push(week);week=[];}week.push(day);});
  if(week.length)weeks.push(week);
  return weeks.map((wk,i)=>{
    const s=wk[0],e=wk[wk.length-1];
    const fmt=d=>`${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}`;
    return{label:`Week ${i+1}: ${fmt(s)} – ${fmt(e)}`,weekStart:dateToStr(s),days:wk};
  });
}

// ===================== THEME =====================
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  const ico=next==='dark'?'🌙':'☀️';
  ['theme-btn','theme-btn-m'].forEach(id=>{const el=$(id);if(el)el.textContent=ico;});
}
(function applyTheme(){
  const t=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  const ico=t==='dark'?'🌙':'☀️';
  document.addEventListener('DOMContentLoaded',()=>{
    ['theme-btn','theme-btn-m'].forEach(id=>{const el=$(id);if(el)el.textContent=ico;});
  });
})();

// ===================== SIDEBAR =====================
function toggleSidebar(){
  $('sidebar').classList.toggle('open');
  $('mob-overlay').classList.toggle('open');
}

// ===================== JSONBIN =====================
async function binGet(id){
  const r=await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`,{headers:{'X-Master-Key':API}});
  return(await r.json()).record;
}
async function binSet(id,data){
  await fetch(`https://api.jsonbin.io/v3/b/${id}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API},body:JSON.stringify(data)});
}

// ===================== LOAD/SAVE =====================
async function loadAll(){
  showLoad('Loading...');
  try{
    const[school,grades,att,sched]=await Promise.all([
      binGet(BIN_SCHOOL).catch(()=>null),
      binGet(BIN_GRADES).catch(()=>null),
      binGet(BIN_ATT).catch(()=>null),
      binGet(BIN_SCHED).catch(()=>null),
    ]);
    if(school){
      DB=school;
      PENDING=school.pending||{};
    }
    if(grades){GRADES=grades.grades||{};LESSON_INFO=grades.lessonInfo||{};THEMATIC=grades.thematic||{};}
    if(att&&typeof att==='object'&&!att.type)ATT=att;
    if(sched&&typeof sched==='object')SCHED=sched;
  }catch(e){console.error(e);}
  // init empty objects
  Object.keys(DB.classes||{}).forEach(cls=>{
    if(!GRADES[cls])GRADES[cls]={};
    if(!ATT[cls])ATT[cls]={};
    if(!SCHED[cls])SCHED[cls]={};
    (DB.classes[cls]||[]).forEach(st=>{if(!GRADES[cls][st])GRADES[cls][st]={};});
  });
  hideLoad();
}
async function saveSchool(){
  const data={users:DB.users,classes:DB.classes,pending:PENDING};
  try{await binSet(BIN_SCHOOL,data);}catch(e){console.error(e);}
}
async function saveGrades(){
  try{await binSet(BIN_GRADES,{grades:GRADES,lessonInfo:LESSON_INFO,thematic:THEMATIC});}catch(e){console.error(e);}
}
async function saveAtt(){try{await binSet(BIN_ATT,ATT);}catch(e){console.error(e);}}
async function saveSched(){
  // Trim to last 16 weeks per class
  Object.keys(SCHED).forEach(cls=>{
    const wks=Object.keys(SCHED[cls]).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort();
    if(wks.length>16)wks.slice(0,wks.length-16).forEach(w=>delete SCHED[cls][w]);
  });
  try{await binSet(BIN_SCHED,SCHED);}catch(e){console.error(e);}
}

function validatePass(p){
  return /[A-Z]/.test(p)&&/[a-z]/.test(p)&&/[0-9]/.test(p)&&/[^A-Za-z0-9]/.test(p)&&p.length>=8;
}

async function doRegister(){
  const email=$('r-email').value.trim().toLowerCase();
  const pass=$('r-pass').value.trim();
  const pass2=$('r-pass2').value.trim();
  const cap=$('r-captcha').value.trim();
  const err=$('r-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Please fill all fields.';return;}
  if(!validatePass(pass)){err.textContent='Password must have uppercase, lowercase, number and symbol (e.g. Aabbcc#123).';return;}
  if(pass!==pass2){err.textContent='Passwords do not match.';return;}
  if(cap!==captchaAnswer){err.textContent='Captcha is wrong. Try again.';genCaptcha();$('r-captcha').value='';return;}
  // Check if already exists
  if(DB.users&&DB.users[email]){err.textContent='This email is already registered.';return;}
  if(PENDING&&PENDING[email]){err.textContent='This email is already pending approval.';return;}
  // Save as pending
  if(!PENDING)PENDING={};
  PENDING[email]={pass,role:'student',status:'pending',children:[]};
  showLoad('Saving...');
  await saveSchool();
  hideLoad();

  $('reg-form').classList.add('hidden');

function getDatesForTeacher(cls){
  const subj=selSubj||getSubjs()[0]||'';
  const dayMap={'Mon':1,'Tue':2,'Wed':3,'Thu':4,'Fri':5};
  const clsSched=SCHED[cls]||{};
  const allowedDays=new Set();
  // Check week-based schedule
  Object.values(clsSched).forEach(wk=>{
    if(typeof wk==='object'&&!Array.isArray(wk)){
      ['Mon','Tue','Wed','Thu','Fri'].forEach(dk=>{
        const lessons=wk[dk]||[];
        if(lessons.some(l=>l.sub===subj||l.sub.toLowerCase().includes(subj.toLowerCase())||subj.toLowerCase().includes(l.sub.toLowerCase())))
          allowedDays.add(dayMap[dk]);
      });
    }
  });
  // Old format
  ['Mon','Tue','Wed','Thu','Fri'].forEach(dk=>{
    const lessons=Array.isArray(clsSched[dk])?clsSched[dk]:[];
    if(lessons.some(l=>l.sub===subj||l.sub.toLowerCase().includes(subj.toLowerCase())||subj.toLowerCase().includes(l.sub.toLowerCase())))
      allowedDays.add(dayMap[dk]);
  });
  const dates=[];
  const d=new Date();
  let tries=0;
  while(dates.length<60&&tries<365){
    if(allowedDays.size===0?(d.getDay()>=1&&d.getDay()<=5):allowedDays.has(d.getDay()))
      dates.push(dateToStr(d));
    d.setDate(d.getDate()-1);tries++;
  }
  return dates;
}

function countSubjInDay(cls,date,subj){
  const d=new Date(date);
  const dk=['','Mon','Tue','Wed','Thu','Fri'][d.getDay()]||'';
  if(!dk)return 1;
  const wkStart=getWeekStart(d);
  const weekSched=SCHED[cls]&&SCHED[cls][wkStart];
  const lessons=(weekSched&&weekSched[dk])||(Array.isArray(SCHED[cls]&&SCHED[cls][dk])?SCHED[cls][dk]:[])||[];
  const subj2=selSubj||getSubjs()[0]||'';
  return lessons.filter(l=>l.sub===subj2||l.sub.toLowerCase().includes(subj2.toLowerCase())||subj2.toLowerCase().includes(l.sub.toLowerCase())).length;
}

function getLessonKey(date){return selLesson>1?`${date}-L${selLesson}`:date;}

function refreshAttTable(){

  const dsel=$('a-date');

// ===================== STUDENT MODAL =====================
function showStudentModal(cls,st){
  const isAdmin=CU.role==='admin';
  const allG=GRADES[cls]&&GRADES[cls][st]?GRADES[cls][st]:{};
  const visG=isAdmin?allG:Object.fromEntries(Object.entries(allG).filter(([subj])=>getSubjs().some(s=>s===subj||subj.toLowerCase().includes(s.toLowerCase())||s.toLowerCase().includes(subj.toLowerCase()))));
  const attData=ATT[cls]||{};
  let abs=0,late=0;const absDates=[];
  Object.entries(attData).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
    if(day[st]==='absent'){abs++;absDates.push({date,v:'absent'});}
    if(day[st]==='late'){late++;absDates.push({date,v:'late'});}
  });
  const gradesHtml=Object.entries(visG).map(([subj,dates])=>{
    const vals=Object.entries(dates).filter(([,v])=>typeof v==='number');
    const avg=vals.length?(vals.reduce((a,[,v])=>a+v,0)/vals.length).toFixed(1):'—';
    const ents=vals.sort((a,b)=>b[0].localeCompare(a[0])).map(([d,g])=>{
      const isL2=d.endsWith('-L2');
      return`<span style="font-size:11px;color:var(--text2);margin-right:6px;">${formatDate(d)}${isL2?' L2':''}: <span class="badge b-${g}">${g}</span></span>`;
    }).join('');
    return`<tr><td style="font-weight:500;">${subj}</td><td>${ents||'—'}</td><td><span class="badge b-${Math.round(parseFloat(avg))}">${avg}</span></td></tr>`;
  }).join('');
  const absHtml=absDates.slice(0,20).map(({date,v})=>`<tr><td>${formatDate(date)}</td><td><span class="badge b-${v}">${v==='absent'?'Absent':'Late'}</span></td></tr>`).join('');
  const m=document.createElement('div');
  m.className='modal-wrap';
  m.innerHTML=`<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div><h2>${st}</h2><p style="font-size:13px;color:var(--text2);">Class ${cls}</p></div>
      <button class="modal-close" onclick="this.closest('.modal-wrap').remove()">✕ Close</button>
    </div>
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card"><div class="sl">Absent</div><div class="sv">${abs}</div></div>
      <div class="stat-card"><div class="sl">Late</div><div class="sv">${late}</div></div>
      <div class="stat-card"><div class="sl">Subjects</div><div class="sv">${Object.keys(visG).length}</div></div>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-head"><h3>Grades</h3></div>
      <table><thead><tr><th>Subject</th><th>Grades</th><th>Avg</th></tr></thead>
      <tbody>${gradesHtml||'<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:20px;">No grades yet</td></tr>'}</tbody></table>
    </div>
    <div class="card">
      <div class="card-head"><h3>Absences</h3></div>
      <table><thead><tr><th>Date</th><th>Status</th></tr></thead>
      <tbody>${absHtml||'<tr><td colspan="2" style="text-align:center;color:var(--text3);padding:20px;">No absences</td></tr>'}</tbody></table>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
}

// ===================== STUDENT - DIARY =====================
function buildDiary(){
  const now=new Date();
  const ay=now.getMonth()>=8?`${now.getFullYear()}-${now.getFullYear()+1}`:`${now.getFullYear()-1}-${now.getFullYear()}`;
  const months=getMonthsForYear(ay);
  const curM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const years=[];
  const curY=now.getFullYear();
  for(let y=curY+1;y>=curY-3;y--)years.push(`${y-1}-${y}`);
  return`<div class="page" id="diary">
    <div class="ptitle">📖 My Diary</div>
    <div class="psub" id="diary-sub"></div>
    <div class="sel-row" style="margin-bottom:16px;">
      <label>Year:</label>
      <select id="d-year" onchange="onDiaryYear()">
        ${years.map(y=>`<option value="${y}" ${y===ay?'selected':''}>${y}</option>`).join('')}
      </select>
      <label>Month:</label>
      <select id="d-month" onchange="onDiaryMonth()">
        ${months.map(m=>`<option value="${m.val}" ${m.val===curM?'selected':''}>${m.label}</option>`).join('')}
      </select>
      <label>Week:</label>
      <select id="d-week" onchange="renderDiary()"><option>Loading...</option></select>
    </div>
    <div id="diary-content"></div>
  </div>`;
}

function initDiary(){
  const cls=CU.class||CU.studentClass||'';
  const name=CU.name||'';
  const sub=$('diary-sub');if(sub)sub.textContent=`${name} · Class ${cls}`;
  window._dCls=cls;window._dName=name;
  onDiaryMonth();
}

function onDiaryYear(){
  const ay=$('d-year').value;
  const months=getMonthsForYear(ay);
  const sel=$('d-month');
  sel.innerHTML=months.map(m=>`<option value="${m.val}">${m.label}</option>`).join('');
  onDiaryMonth();
}

function onDiaryMonth(){
  const monthVal=$('d-month').value;
  const weeks=getWeeksOfMonth(monthVal);
  const wsel=$('d-week');
  const today=getTodayStr();
  wsel.innerHTML=weeks.map((w,i)=>`<option value="${i}">${w.label}</option>`).join('');
  // Select current week
  const ci=weeks.findIndex(w=>w.days.some(d=>dateToStr(d)===today));
  if(ci>=0)wsel.value=ci;
  renderDiary();
}

function renderDiary(){
  const cls=window._dCls,name=window._dName;
  const monthVal=$('d-month').value;
  const wi=parseInt($('d-week').value)||0;
  const weeks=getWeeksOfMonth(monthVal);
  const wk=weeks[wi];
  const content=$('diary-content');
  if(!wk||!content){return;}
  const DK={1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri'};
  const DN=['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  content.innerHTML=wk.days.map(day=>{
    const ds=dateToStr(day),dk=DK[day.getDay()];
    const wkStart=getWeekStart(day);
    const weekSched=SCHED[cls]&&SCHED[cls][wkStart];
    const sched=(weekSched&&weekSched[dk])||(Array.isArray(SCHED[cls]&&SCHED[cls][dk])?SCHED[cls][dk]:[])||[];
    const att=ATT[cls]&&ATT[cls][ds]?ATT[cls][ds][name]:null;
    return`<div class="card" style="margin-bottom:12px;">
      <div class="diary-day-head">
        <span>${DN[day.getDay()-1]}, ${day.getDate()} ${MN[day.getMonth()]} ${day.getFullYear()}</span>
        ${att?`<span class="badge b-${att}">${att==='present'?'Present':att==='absent'?'Absent':'Late'}</span>`:''}
      </div>
      <table><thead><tr><th style="width:32px;">#</th><th>Subject</th><th style="width:80px;text-align:center;">Grade</th></tr></thead>
      <tbody>
        ${sched.length?sched.map((les,i)=>{
          const sg=GRADES[cls]&&GRADES[cls][name]&&GRADES[cls][name][les.sub]?GRADES[cls][name][les.sub]:{};
          const g=sg[ds]||'',g2=sg[ds+'-L2']||'';
          const info=LESSON_INFO[cls]&&LESSON_INFO[cls][les.sub]&&LESSON_INFO[cls][les.sub][ds]?LESSON_INFO[cls][les.sub][ds]:{};
          const hasInfo=info.topic||info.homework;
          const iid=`info-${ds}-${i}`;
          return`<tr><td style="font-size:11px;color:var(--text3);">${i+1}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:13px;font-weight:500;">${les.sub}</span>
                ${hasInfo?`<button onclick="toggleInfo('${iid}')" style="background:none;border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:10px;color:var(--text2);cursor:pointer;">ℹ</button>`:''}
              </div>
              <div id="${iid}" style="display:none;margin-top:4px;">
                ${info.topic?`<div style="font-size:11px;color:var(--text2);">📖 ${info.topic}</div>`:''}
                ${info.homework?`<div style="font-size:11px;color:var(--amber);">✏️ ${info.homework}</div>`:''}
              </div>
            </td>
            <td style="text-align:center;">
              ${g?`<span class="badge b-${g}">${g}</span>`:'<span style="color:var(--text3);">—</span>'}
              ${g2?`<span class="badge b-${g2}" style="margin-left:3px;">${g2}</span>`:''}
            </td></tr>`;
        }).join(''):`<tr><td colspan="3" style="padding:12px;text-align:center;color:var(--text3);font-size:12px;">No lessons scheduled</td></tr>`}
      </tbody></table>
    </div>`;
  }).join('');
}

function showAdmAbsences(cls){
  const students=DB.classes[cls]||[];
  const sum={};students.forEach(st=>sum[st]={abs:0,late:0,last:''});
  Object.entries(ATT[cls]||{}).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{

let _dragSrc=null;
function dStart(e){_dragSrc=e.currentTarget;e.dataTransfer.effectAllowed='move';}
function dOver(e){e.preventDefault();}
async function dDrop(e){

  const cls=t.getAttribute('data-cls');
  const list=$(`stu-list-${cls}`);const items=[...list.children];

function buildAdmSched(){
  const classes=Object.keys(DB.classes||{}).sort();

  const ay=now.getMonth()>=8?`${now.getFullYear()}-${now.getFullYear()+1}`:`${now.getFullYear()-1}-${now.getFullYear()}`;
  const months=getMonthsForYear(ay);
  const curM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const years=[];const cy=now.getFullYear();
  for(let y=cy+1;y>=cy-2;y--)years.push(`${y-1}-${y}`);
  return`<div class="page" id="adm-sched">
    <div class="ptitle">Schedule</div>
    <div class="sel-row" style="flex-wrap:wrap;">
      <label>Class:</label>
      <select id="sc-cls" onchange="onSchedCls()">${classes.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      <label>Year:</label>
      <select id="sc-year" onchange="onSchedYear()">${years.map(y=>`<option value="${y}" ${y===ay?'selected':''}>${y}</option>`).join('')}</select>
      <label>Month:</label>
      <select id="sc-month" onchange="onSchedMonth()">${months.map(m=>`<option value="${m.val}" ${m.val===curM?'selected':''}>${m.label}</option>`).join('')}</select>
      <label>Week:</label>
      <select id="sc-week" onchange="renderSchedEditor()"><option>Loading...</option></select>
      <label>Day:</label>
      <select id="sc-day" onchange="renderSchedEditor()">${days.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
    </div>
    <div class="form-card" style="margin-bottom:14px;">
      <h3>Copy Week</h3>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <label style="font-size:13px;color:var(--text2);">Copy current week to:</label>
        <select id="sc-copy-to" style="padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;min-width:200px;"><option>Loading...</option></select>
        <button class="btn btn-p" onclick="copyWeek()">Copy</button>
      </div>
    </div>
    <div id="sched-editor"></div>
  </div>`;
}

function onSchedYear(){
  const ay=$('sc-year').value;
  const months=getMonthsForYear(ay);
  const sel=$('sc-month');
  sel.innerHTML=months.map(m=>`<option value="${m.val}">${m.label}</option>`).join('');
  onSchedMonth();
}
function onSchedCls(){renderSchedEditor();}
function onSchedMonth(){
  const mv=$('sc-month').value;
  const weeks=getWeeksOfMonth(mv);
  const wsel=$('sc-week');
  wsel.innerHTML=weeks.map((w,i)=>`<option value="${i}">${w.label}</option>`).join('');
  const today=getTodayStr();
  const ci=weeks.findIndex(w=>w.days.some(d=>dateToStr(d)===today));
  if(ci>=0)wsel.value=ci;
  // Populate copy-to
  const ay=$('sc-year').value;
  const allMs=getMonthsForYear(ay);
  const curW=weeks[parseInt(wsel.value)||0]?.weekStart;
  let allW=[];allMs.forEach(m=>getWeeksOfMonth(m.val).forEach(w=>allW.push({...w,mLabel:m.label})));
  const csel=$('sc-copy-to');
  if(csel)csel.innerHTML='<option value="">Select week...</option>'+allW.filter(w=>w.weekStart!==curW).map(w=>`<option value="${w.weekStart}">${w.mLabel} — ${w.label}</option>`).join('');
  renderSchedEditor();
}
function getSchedWeek(){
  const mv=$('sc-month').value;

          </div>
        </td>
      </tr>`).join('')}
    </tbody></table>

async function saveLesson(cls,wk,day,i){
  const s=$(`sc-es-${i}`)?.value.trim(),t=$(`sc-et-${i}`)?.value.trim();

  SCHED[cls][wk][day][i]={sub:s,teacher:t||''};

async function addLesson(cls,wk,day){
  const s=$('sc-ns')?.value.trim(),t=$('sc-nt')?.value.trim();if(!s)return;
  if(!SCHED[cls])SCHED[cls]={};if(!SCHED[cls][wk])SCHED[cls][wk]={};if(!SCHED[cls][wk][day])SCHED[cls][wk][day]=[];
  SCHED[cls][wk][day].push({sub:s,teacher:t||''});

async function delLesson(cls,wk,day,i){
  SCHED[cls][wk][day].splice(i,1);

async function mvUp(cls,wk,day,i){
  if(i===0)return;const a=SCHED[cls][wk][day];[a[i-1],a[i]]=[a[i],a[i-1]];

async function mvDn(cls,wk,day,i){
  const a=SCHED[cls][wk][day];if(i>=a.length-1)return;[a[i],a[i+1]]=[a[i+1],a[i]];

async function copyWeek(){

              <span style="color:var(--text2);">ID: ${c.publicId}</span>
              <span style="color:var(--text2);">DOB: ${c.dob}</span>
              <span style="color:var(--text2);">Class: <select onchange="PENDING['${email}'].children[${(data.children||[]).indexOf(c)}].cls=this.value" style="padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit;">
                <option value="">Select class...</option>
                ${Object.keys(DB.classes||{}).map(cl=>`<option value="${cl}" ${c.cls===cl?'selected':''}>${cl}</option>`).join('')}
              </select></span>
            </div>`).join('')}
        </div>
      </div>`).join('')}
  </div>`;
}

async function approvePending(email){
  const data=PENDING[email];
  if(!data){alert('Not found.');return;}
  // Check all children have class assigned
  const missingCls=(data.children||[]).filter(c=>!c.cls);
  if(missingCls.length){alert('Please assign a class to all children first.');return;}
  // Create student account
  if(!DB.users)DB.users={};
  DB.users[email]={role:'student',name:(data.children[0]?.name)||email,pass:data.pass,class:data.children[0]?.cls||'',children:data.children};
  delete PENDING[email];
  showLoad('Saving...');await saveSchool();hideLoad();flash();showPage('adm-pending');
}

async function rejectPending(email){
  if(!confirm(`Reject ${email}?`))return;
  delete PENDING[email];
  showLoad('Saving...');await saveSchool();hideLoad();flash();showPage('adm-pending');
}

// ===================== INIT =====================
(async()=>{
  await loadAll();
})();
</script>
</body>
</html>
