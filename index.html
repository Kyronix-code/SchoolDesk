<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SchoolDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
:root{--bg:#0d1117;--surf:#161b27;--surf2:#1e2535;--surf3:#252d3d;--bdr:#2a3347;--acc:#4f8ef7;--grn:#22c55e;--amb:#f59e0b;--red:#ef4444;--txt:#e8eaf0;--txt2:#8b93a8;--txt3:#4a5270;--r:10px;--r2:14px}
[data-theme=light]{--bg:#023E8A;--surf:#0353a4;--surf2:#0466c8;--surf3:#0077b6;--bdr:#0096c7;--acc:#caf0f8;--grn:#52b788;--amb:#ffd60a;--red:#ff6b6b;--txt:#fff;--txt2:#caf0f8;--txt3:#90e0ef}
.h{display:none!important}
/* AUTH */
.aw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.ab{width:100%;max-width:380px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);padding:28px}
.al{text-align:center;margin-bottom:20px}
.al .ic{width:50px;height:50px;background:var(--acc);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px}
.al h1{font-size:19px;font-weight:700}
.al p{font-size:12px;color:var(--txt2);margin-top:3px}
.rtabs{display:flex;gap:3px;background:var(--surf2);border-radius:8px;padding:3px;margin-bottom:16px}
.rtab{flex:1;text-align:center;padding:6px 4px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--txt2);transition:.15s}
.rtab.on{background:var(--surf3);color:var(--txt);font-weight:600}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px}
.fg input,.fg select{width:100%;padding:9px 11px;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--acc)}
.bmain{width:100%;padding:11px;background:var(--acc);border:none;border-radius:8px;color:#0d1117;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.bmain:hover{opacity:.88}
.er{font-size:12px;color:var(--red);text-align:center;margin-top:6px;min-height:16px}
.lb{background:none;border:none;color:var(--acc);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}
.af{text-align:center;margin-top:10px;font-size:13px;color:var(--txt2)}
/* APP LAYOUT */
#app{display:flex;min-height:100vh}
.sb{width:216px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbh{padding:16px 14px;border-bottom:1px solid var(--bdr)}
.sbh .brand{font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.sbh .un{font-size:11px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbh .ur{display:inline-block;margin-top:4px;font-size:10px;padding:2px 7px;background:var(--surf3);border-radius:20px;color:var(--acc)}
.sbn{flex:1;padding:8px 6px}
.sbs{font-size:10px;color:var(--txt3);padding:6px 8px 3px;text-transform:uppercase;letter-spacing:.07em}
.ni{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:8px;font-size:13px;color:var(--txt2);cursor:pointer;margin-bottom:1px;transition:.12s;user-select:none}
.ni:hover{background:var(--surf2);color:var(--txt)}
.ni.on{background:var(--surf2);color:var(--acc);border-left:3px solid var(--acc);padding-left:6px}
.sbf{padding:10px;border-top:1px solid var(--bdr)}
.bout{width:100%;padding:7px;background:transparent;border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);font-size:12px;cursor:pointer;font-family:inherit}
.bout:hover{border-color:var(--red);color:var(--red)}
.mn{flex:1;overflow-y:auto}
.pg{padding:22px 26px;display:none}
.pg.on{display:block}
.pt{font-size:21px;font-weight:700;margin-bottom:3px}
.ps{font-size:13px;color:var(--txt2);margin-bottom:18px}
/* MOBILE */
.mh{display:none;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surf);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:98}
@media(max-width:720px){
  #app{flex-direction:column}
  .mh{display:flex}
  .sb{position:fixed;top:0;left:-230px;height:100vh;z-index:99;transition:left .22s;width:216px}
  .sb.op{left:0}
  .ov.op{display:block}
  .pg{padding:14px 12px}
  .sr{flex-direction:column;align-items:flex-start}
  .srow{grid-template-columns:repeat(2,1fr)!important}
}
/* COMPONENTS */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);padding:15px}
.sc .sl{font-size:11px;color:var(--txt3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.sc .sv{font-size:26px;font-weight:700}
.sc .ss{font-size:11px;color:var(--txt2);margin-top:2px}
.cd{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.cdh{padding:13px 17px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cdh h3{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:8px 13px;text-align:left;font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr);font-weight:500}
td{padding:10px 13px;font-size:13px;border-bottom:1px solid var(--bdr)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b10,.b9{background:rgba(34,197,94,.15);color:#4ade80}
.b8,.b7{background:rgba(79,142,247,.15);color:#7ab3f8}
.b6,.b5{background:rgba(245,158,11,.15);color:#fbbf24}
.b4,.b3,.b2,.b1{background:rgba(239,68,68,.15);color:#f87171}
.bp{background:rgba(34,197,94,.15);color:#4ade80}
.ba{background:rgba(239,68,68,.15);color:#f87171}
.bl{background:rgba(245,158,11,.15);color:#fbbf24}
.av{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.avb{background:rgba(79,142,247,.18);color:var(--acc)}
.avp{background:rgba(124,58,237,.18);color:#a78bfa}
.tf{display:flex;align-items:center;gap:8px}
.btn{padding:6px 13px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:.13s;font-weight:500;border:none}
.bp2{background:var(--acc);color:#0d1117}
.bp2:hover{opacity:.85}
.bg2{background:transparent;border:1px solid var(--bdr)!important;color:var(--txt2)}
.bg2:hover{border-color:var(--acc)!important;color:var(--acc)}
.bd2{background:transparent;border:1px solid var(--red)!important;color:var(--red)}
.bd2:hover{background:rgba(239,68,68,.09)}
.sr{display:flex;gap:9px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.sr label{font-size:13px;color:var(--txt2)}
select,input[type=date]{padding:7px 11px;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:13px;font-family:inherit;outline:none}
select:focus{border-color:var(--acc)}
.gi{width:44px;padding:5px;text-align:center;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-size:13px;font-family:monospace;outline:none}
.gi:focus{border-color:var(--acc)}
.ab2{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;border:1px solid var(--bdr);background:var(--surf2);color:var(--txt2);margin-right:4px;transition:.12s}
.ab2.on{border-color:transparent}
.ab2.p{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.3)}
.ab2.a{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.3)}
.ab2.l{background:rgba(245,158,11,.15);color:#fbbf24;border-color:rgba(245,158,11,.3)}
.fl{position:fixed;bottom:18px;right:18px;background:#22c55e;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.fl.on{opacity:1}
.ld{position:fixed;inset:0;background:rgba(13,17,23,.82);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:11px}
.ld p{color:var(--txt2);font-size:13px}
.sp{width:34px;height:34px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.fc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.fc h3{font-size:13px;font-weight:600;margin-bottom:14px}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:10px}
.ff label{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px}
.ff input,.ff select{width:100%;padding:7px 9px;background:var(--surf2);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:13px;font-family:inherit;outline:none}
.ff input:focus,.ff select:focus{border-color:var(--acc)}
.mw{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.md{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);width:100%;max-width:680px;padding:22px}
.ddh{padding:9px 15px;background:var(--surf2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500}
.pb{background:rgba(245,158,11,.15);color:#fbbf24;padding:2px 8px;border-radius:20px;font-size:11px}
</style>
</head>
<body>

<div id="aw" class="aw">
  <div class="ab">
    <div class="al">
      <div class="ic">🏫</div>
      <h1>SchoolDesk</h1>
      <p>School Management System</p>
    </div>
    <div id="lf">
      <div class="rtabs" id="rtabs">
        <div class="rtab on" onclick="window.setRole&&window.setRole('teacher')">Teacher</div>
        <div class="rtab" onclick="window.setRole&&window.setRole('student')">Student</div>
        <div class="rtab" onclick="window.setRole&&window.setRole('parent')">Parent</div>
        <div class="rtab" onclick="window.setRole&&window.setRole('admin')">Admin</div>
      </div>
      <div class="fg"><label>Username</label><input id="lu" placeholder="username" onkeydown="if(event.key==='Enter')login()"></div>
      <div class="fg"><label>Password</label><input id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="bmain" onclick="window.login&&window.login()">Sign In</button>
      <div class="er" id="le"></div>
      <div class="af">New student? <button class="lb" onclick="window.showF&&window.showF('rf')">Register</button></div>
    </div>
    <div id="rf" class="h">
      <div style="margin-bottom:12px"><button class="lb" onclick="window.showF&&window.showF('lf')" style="color:var(--txt2)">← Back</button></div>
      <div class="fg"><label>Email</label><input id="re" type="email" placeholder="your@email.com"></div>
      <div class="fg"><label>Password <small style="color:var(--txt3)">(Aa1# required)</small></label><input id="rp" type="password" placeholder="Aabbcc#123"></div>
      <div class="fg"><label>Confirm Password</label><input id="rp2" type="password" placeholder="Repeat"></div>
      <div class="fg"><label id="cql">Captcha: ?</label><input id="rca" placeholder="Answer"></div>
      <button class="bmain" onclick="window.doReg&&window.doReg()">Create Account</button>
      <div class="er" id="re2"></div>
    </div>
    <div id="pf" class="h">
      <div style="text-align:center;padding:12px 0 16px">
        <div style="font-size:36px;margin-bottom:8px">⏳</div>
        <h2 style="font-size:16px;margin-bottom:6px">Waiting for approval</h2>
        <p style="color:var(--txt2);font-size:13px">Please enter your child's details</p>
      </div>
      <div class="fg"><label>Child's Full Name</label><input id="pn" placeholder="Ani Hakobyan"></div>
      <div class="fg"><label>Public ID (Հnr. hamaranishn)</label><input id="pi" placeholder="12345678"></div>
      <div class="fg"><label>Date of Birth (DD.MM.YYYY)</label><input id="pd" placeholder="10.10.2010"></div>
      <button class="bmain" onclick="window.subPend&&window.subPend()">Submit</button>
      <div class="er" id="pe"></div>
    </div>
    <div id="cf" class="h">
      <div style="text-align:center;padding:8px 0 14px">
        <div style="font-size:32px;margin-bottom:6px">✅</div>
        <h2 style="font-size:15px;margin-bottom:4px">Submitted!</h2>
        <p style="color:var(--txt2);font-size:12px">Add another child? (optional)</p>
      </div>
      <div class="fg"><label>Child's Full Name</label><input id="cn" placeholder="Aram Hakobyan"></div>
      <div class="fg"><label>Public ID</label><input id="ci" placeholder="12345679"></div>
      <div class="fg"><label>Date of Birth (DD.MM.YYYY)</label><input id="cd" placeholder="15.03.2012"></div>
      <button class="bmain" onclick="window.addChild&&window.addChild()">Add Child</button>
      <div style="text-align:center;margin-top:8px"><button class="lb" onclick="window.showF&&window.showF('lf')">Done → Login</button></div>
      <div class="er" id="ce"></div>
    </div>
  </div>
</div>

<div id="app" class="h">
  <div class="mh">
    <button onclick="tgSb()" style="background:none;border:none;cursor:pointer;color:var(--txt);font-size:20px">☰</button>
    <span style="font-size:14px;font-weight:700">🏫 SchoolDesk</span>
    <button onclick="tgTheme()" id="tmbtn" style="background:none;border:1px solid var(--bdr);border-radius:7px;padding:3px 8px;color:var(--txt2);cursor:pointer;font-size:13px">🌙</button>
  </div>
  <div class="ov" id="ov" onclick="tgSb()"></div>
  <div class="sb" id="sb">
    <div class="sbh">
      <div class="brand">🏫 SchoolDesk <button onclick="tgTheme()" id="tbtn" style="background:none;border:1px solid var(--bdr);border-radius:7px;padding:2px 7px;color:var(--txt2);cursor:pointer;font-size:12px">🌙</button></div>
      <div class="un" id="sbn"></div>
      <div class="ur" id="sbr"></div>
    </div>
    <nav class="sbn" id="nav"></nav>
    <div class="sbf"><button class="bout" onclick="logout()">← Sign Out</button></div>
  </div>
  <div class="mn" id="mn"></div>
</div>

<div class="ld h" id="ld"><div class="sp"></div><p id="ldt">Loading...</p></div>
<div class="fl" id="fl">✓ Saved</div>



<script>
const AK='$2a$10$Gi.k.77zA4oqHpM7hiWOPu.sz164TIhfB/m5M0o91k2DOfHCi08b6';
const BS='69be81f0b7ec241ddc8bb006';
const BG='69be81fdaa77b81da90584f9';
const BA='69be81feaa77b81da90584fe';
const BC='69be81efb7ec241ddc8baffe';
const AP='SchoolAdmin2026';

let DB={users:{},classes:{}},SC={},GR={},LI={},AT={},PE={};
let CU=null,sCls=null,sDate='',sSubj=null,sLes=1,cRole='teacher';

const $=id=>document.getElementById(id);
const ini=n=>(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
function tod(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pad(n){return String(n).padStart(2,'0')}
function d2s(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function fmtD(s){if(!s)return'—';const d=new Date(s.replace(/-L\d$/,''));return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]}
function sLoad(t){$('ld').classList.remove('h');$('ldt').textContent=t||'Loading...'}
function hLoad(){$('ld').classList.add('h')}
function flash(){const f=$('fl');f.classList.add('on');setTimeout(()=>f.classList.remove('on'),2000)}
function subjs(u){return((u||CU).subject||'').split('&').map(s=>s.trim()).filter(Boolean)}
function wkStart(dt){const d=new Date(dt||new Date());const dy=d.getDay();d.setDate(d.getDate()+(dy===0?-6:1-dy));return d2s(d)}
function getMonths(ay){
  const[y1,y2]=ay.split('-').map(Number);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const r=[];
  for(let m=8;m<=11;m++)r.push({v:y1+'-'+pad(m+1),l:M[m]+' '+y1});
  for(let m=0;m<=5;m++)r.push({v:y2+'-'+pad(m+1),l:M[m]+' '+y2});
  return r;
}
function getWeeks(mv){
  const[yr,mo]=mv.split('-').map(Number);
  const days=[];const d=new Date(yr,mo-1,1);
  while(d.getMonth()===mo-1){if(d.getDay()>=1&&d.getDay()<=5)days.push(new Date(d));d.setDate(d.getDate()+1)}
  const wks=[];let wk=[];
  days.forEach(d=>{if(d.getDay()===1&&wk.length){wks.push(wk);wk=[]}wk.push(d)});
  if(wk.length)wks.push(wk);
  const DN=['Mon','Tue','Wed','Thu','Fri'];
  return wks.map((wk,i)=>{
    const s=wk[0],e=wk[wk.length-1];
    return{l:'Week '+(i+1)+': '+s.getDate()+'.'+pad(s.getMonth()+1)+' – '+e.getDate()+'.'+pad(e.getMonth()+1),ws:d2s(s),days:wk};
  });
}
function curAY(){const n=new Date();const y=n.getFullYear();return n.getMonth()>=8?y+'-'+(y+1):(y-1)+'-'+y}

// THEME
function tgTheme(){
  const t=document.documentElement.getAttribute('data-theme')||'dark';
  const nt=t==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',nt);
  localStorage.setItem('th',nt);
  const ic=nt==='dark'?'🌙':'☀️';
  ['tbtn','tmbtn'].forEach(id=>{const e=$(id);if(e)e.textContent=ic});
}
(function(){
  const t=localStorage.getItem('th')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  window.addEventListener('DOMContentLoaded',()=>{
    const ic=t==='dark'?'🌙':'☀️';
    ['tbtn','tmbtn'].forEach(id=>{const e=$(id);if(e)e.textContent=ic});
  });
})();

// SIDEBAR
function tgSb(){$('sb').classList.toggle('op');$('ov').classList.toggle('op')}
function clSb(){$('sb').classList.remove('op');$('ov').classList.remove('op')}

// API
async function bGet(id){
  const r=await fetch('https://api.jsonbin.io/v3/b/'+id+'/latest',{headers:{'X-Master-Key':AK}});
  return(await r.json()).record;
}
async function bSet(id,data){
  await fetch('https://api.jsonbin.io/v3/b/'+id,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':AK},body:JSON.stringify(data)});
}

// LOAD/SAVE
async function loadAll(){
  sLoad('Loading...');
  try{
    const[s,g,a,c]=await Promise.all([bGet(BS).catch(()=>null),bGet(BG).catch(()=>null),bGet(BA).catch(()=>null),bGet(BC).catch(()=>null)]);
    if(s&&s.users){DB=s;PE=s.pending||{}}
    if(g){GR=g.grades||{};LI=g.lessonInfo||{}}
    if(a&&typeof a==='object'&&!a.type)AT=a;
    if(c&&typeof c==='object')SC=c;
  }catch(e){console.error(e)}
  Object.keys(DB.classes||{}).forEach(cls=>{
    if(!GR[cls])GR[cls]={};
    if(!AT[cls])AT[cls]={};
    if(!SC[cls])SC[cls]={};
    (DB.classes[cls]||[]).forEach(st=>{if(!GR[cls][st])GR[cls][st]={}});
  });
  hLoad();
}
async function svSchool(){
  try{await bSet(BS,{users:DB.users,classes:DB.classes,pending:PE})}catch(e){console.error(e)}
}
async function svGrades(){
  try{await bSet(BG,{grades:GR,lessonInfo:LI})}catch(e){console.error(e)}
}
async function svAtt(){try{await bSet(BA,AT)}catch(e){console.error(e)}}
async function svSched(){
  Object.keys(SC).forEach(cls=>{
    const wks=Object.keys(SC[cls]).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
    if(wks.length>16)wks.slice(0,wks.length-16).forEach(w=>delete SC[cls][w]);
  });
  try{await bSet(BC,SC)}catch(e){console.error(e)}
}

// CAPTCHA
let _ca='';
function genCap(){const a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1;_ca=''+(a+b);const el=$('cql');if(el)el.textContent='Captcha: '+a+' + '+b+' = ?'}

// AUTH FORMS

function setRole(r){
  cRole=r;
  $('rtabs').querySelectorAll('.rtab').forEach((t,i)=>{t.classList.toggle('on',['teacher','student','parent','admin'][i]===r)});
}
function vPass(p){return/[A-Z]/.test(p)&&/[a-z]/.test(p)&&/[0-9]/.test(p)&&/[^A-Za-z0-9]/.test(p)&&p.length>=8}

function login(){
  const u=$('lu').value.trim().toLowerCase();
  const p=$('lp').value.trim();
  const er=$('le');er.textContent='';
  if(cRole==='admin'){
    if(p===AP){CU={role:'admin',name:'Administrator',username:'admin'};startApp()}
    else er.textContent='Wrong password';return;
  }
  const users=DB.users||{};
  let found=null,fk=null;
  for(const[k,v]of Object.entries(users)){
    const lk=k.replace(/_t$|_s$/,'').toLowerCase();
    if(lk===u&&v.role===cRole&&v.pass===p){found=v;fk=k;break}
  }
  if(!found){er.textContent='Wrong username, password or role';return}
  CU={...found,username:fk};
  startApp();
}

async function doReg(){
  const e=$('re').value.trim().toLowerCase(),p=$('rp').value.trim(),p2=$('rp2').value.trim(),ca=$('rca').value.trim();
  const er=$('re2');er.textContent='';
  if(!e||!p){er.textContent='Fill all fields';return}
  if(!vPass(p)){er.textContent='Password must have A-Z, a-z, 0-9 and symbol';return}
  if(p!==p2){er.textContent='Passwords do not match';return}
  if(ca!==_ca){er.textContent='Wrong captcha';genCap();$('rca').value='';return}
  if(DB.users&&DB.users[e]){er.textContent='Email already registered';return}
  if(PE[e]){er.textContent='Email already pending';return}
  PE[e]={pass:p,status:'pending',children:[]};
  window._pe=e;
  sLoad('Saving...');await svSchool();hLoad();
  showF('pf');
}

async function subPend(){
  const n=$('pn').value.trim(),i=$('pi').value.trim(),d=$('pd').value.trim();

function getDates(cls){
  const sj=sSubj||subjs()[0]||'';
  const dk2n={'Mon':1,'Tue':2,'Wed':3,'Thu':4,'Fri':5};
  const clsc=SC[cls]||{};
  const allowed=new Set();
  Object.values(clsc).forEach(wk=>{
    if(wk&&typeof wk==='object'&&!Array.isArray(wk)){
      ['Mon','Tue','Wed','Thu','Fri'].forEach(dk=>{
        const ls=wk[dk]||[];
        if(ls.some(l=>matchSubj(l.sub,sj)))allowed.add(dk2n[dk]);
      });
    }
  });
  ['Mon','Tue','Wed','Thu','Fri'].forEach(dk=>{
    const ls=Array.isArray(clsc[dk])?clsc[dk]:[];
    if(ls.some(l=>matchSubj(l.sub,sj)))allowed.add(dk2n[dk]);
  });
  const dates=[];const d=new Date();let tr=0;
  while(dates.length<60&&tr<365){
    if(d.getDay()>=1&&d.getDay()<=5){
      if(allowed.size===0||allowed.has(d.getDay()))dates.push(d2s(d));
    }
    d.setDate(d.getDate()-1);tr++;
  }
  return dates;
}

function matchSubj(a,b){
  if(!a||!b)return false;
  return a===b||a.toLowerCase().includes(b.toLowerCase())||b.toLowerCase().includes(a.toLowerCase());
}

function cntSubjDay(cls,date,sj){
  const d=new Date(date);
  const dkm=['','Mon','Tue','Wed','Thu','Fri'];
  const dk=dkm[d.getDay()]||'';if(!dk)return 1;
  const ws=wkStart(d);
  const wsched=SC[cls]&&SC[cls][ws];
  const ls=(wsched&&wsched[dk])||(Array.isArray(SC[cls]&&SC[cls][dk])?SC[cls][dk]:[])||[];
  return ls.filter(l=>matchSubj(l.sub,sj)).length;
}

function lKey(date){return sLes>1?date+'-L'+sLes:date}

function onGrCls(){rfGR();}
function rfGR(){
  const cls=sCls,sj=sSubj||subjs()[0]||'';
  // Update student jump dropdown
  const sts=DB.classes[cls]||[];
  const sJump=$('g-stu-jump');
  if(sJump)sJump.innerHTML='<option value="">All students</option>'+sts.map((st,i)=>'<option value="'+i+'">'+st+'</option>').join('');
  const dates=getDates(cls);
  const dsel=$('gdt');
  if(dsel){
    const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    dsel.innerHTML=dates.map(d=>{const dt=new Date(d);return'<option value="'+d+'"'+(d===sDate?' selected':'')+'>'+DN[dt.getDay()]+' '+dt.getDate()+' '+MN[dt.getMonth()]+' '+dt.getFullYear()+'</option>'}).join('');
    if(!dates.includes(sDate)&&dates.length)sDate=dates[0];
    if(dsel.value)sDate=dsel.value;
  }
  const cnt=cntSubjDay(cls,sDate,sj);
  const glw=$('glw');if(glw)glw.style.display=cnt>=2?'inline-flex':'none';
  if(cnt<2)sLes=1;
  const lk=lKey(sDate);
  const tt=$('gtit');if(tt)tt.textContent=cls+' · '+sj+' · '+fmtD(sDate)+(sLes>1?' (Lesson '+sLes+')':'');
  const li=(LI[cls]&&LI[cls][sj])?LI[cls][sj][lk]||{}:{};
  const tp=$('gtp'),hw=$('ghw');
  if(tp)tp.value=li.topic||'';if(hw)hw.value=li.homework||'';
  const tbl=$('gtbl');if(!tbl)return;
  tbl.innerHTML='<thead><tr><th>Student</th><th>Grade (1–10)</th></tr></thead><tbody>'
    +sts.map((st,i)=>{
      const g=(GR[cls]&&GR[cls][st]&&GR[cls][st][sj])?GR[cls][st][sj][lk]||'':'';
      return'<tr><td><div class="tf"><div class="av avb">'+ini(st)+'</div>'+st+'</div></td>'
        +'<td><div style="display:flex;align-items:center;gap:6px">'
        +'<input class="gi" type="number" min="1" max="10" value="'+g+'" id="gi'+i+'" placeholder="—">'
        +(g?'<button onclick="clrG('+i+')" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px">✕</button>':'')
        +'</div></td></tr>';
    }).join('')+'</tbody>';

async function svGR(){
  const cls=sCls,sj=sSubj||subjs()[0]||'',lk=lKey(sDate);
  if(!GR[cls])GR[cls]={};
  (DB.classes[cls]||[]).forEach((st,i)=>{
    const v=$('gi'+i)?.value;
    if(!GR[cls][st])GR[cls][st]={};
    if(!GR[cls][st][sj])GR[cls][st][sj]={};
    if(v&&parseInt(v)>=1&&parseInt(v)<=10)GR[cls][st][sj][lk]=parseInt(v);
    else delete GR[cls][st][sj][lk];
  });
  const tp=$('gtp')?.value||'',hw=$('ghw')?.value||'';
  if(!LI[cls])LI[cls]={};if(!LI[cls][sj])LI[cls][sj]={};
  LI[cls][sj][lk]={topic:tp,homework:hw};
  sLoad('Saving...');await svGrades();hLoad();flash();
}

  if(!AT[cls])AT[cls]={};if(!AT[cls][sDate])AT[cls][sDate]={};

        +'<td>'+mk('present','Present','p')+mk('absent','Absent','a')+mk('late','Late','l')+'</td></tr>';
    }).join('')+'</tbody>';
}

function stuModal(cls,st){
  const isAdm=CU.role==='admin';
  const allG=(GR[cls]&&GR[cls][st])?GR[cls][st]:{};
  const visG=isAdm?allG:Object.fromEntries(Object.entries(allG).filter(([sj])=>subjs().some(s=>matchSubj(sj,s))));
  const ad=AT[cls]||{};
  let ab=0,lt=0;const abd=[];
  Object.entries(ad).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,day])=>{
    if(day[st]==='absent'){ab++;abd.push({d:date,v:'absent'})}
    if(day[st]==='late'){lt++;abd.push({d:date,v:'late'})}
  });
  const gRows=Object.entries(visG).map(([sj,dates])=>{
    const vals=Object.entries(dates).filter(([,v])=>typeof v==='number');
    const avg=vals.length?(vals.reduce((a,[,v])=>a+v,0)/vals.length).toFixed(1):'—';
    const ents=vals.sort((a,b)=>b[0].localeCompare(a[0])).map(([d,g])=>{
      const isl=d.endsWith('-L2');

    }).join('');

  }).join('');
  const aRows=abd.slice(0,20).map(({d,v})=>'<tr><td>'+fmtD(d)+'</td><td><span class="badge b'+v.charAt(0)+'">'+cap(v)+'</span></td></tr>').join('');

  const m=document.createElement('div');m.className='mw';
  m.innerHTML='<div class="md">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div><div style="font-size:17px;font-weight:700">'+st+'</div><div style="font-size:12px;color:var(--txt2)">Class '+cls+'</div></div>'
    +'<button onclick="this.closest(\'.mw\').remove()" style="background:none;border:1px solid var(--bdr);border-radius:7px;padding:5px 12px;color:var(--txt2);cursor:pointer;font-family:inherit">✕ Close</button>'
    +'</div>'
    +'<p style="font-size:12px;color:var(--txt2);margin-bottom:12px">Click a grade to edit it</p>'
    +'<div class="srow" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="sc"><div class="sl">Absent</div><div class="sv" style="color:var(--red)">'+ab+'</div></div>'
    +'<div class="sc"><div class="sl">Late</div><div class="sv" style="color:var(--amb)">'+lt+'</div></div>'
    +'<div class="sc"><div class="sl">Avg Grade</div><div class="sv">'+avgTot+'</div></div>'
    +'</div>'
    +'<div class="cd" style="margin-bottom:12px"><div class="cdh"><h3>Grades by Subject</h3></div>'
    +'<table><thead><tr><th>Subject</th><th>Grades</th><th>Avg</th></tr></thead><tbody>'
    +(gRows||'<tr><td colspan="3" style="text-align:center;color:var(--txt3);padding:16px">No grades yet</td></tr>')
    +'</tbody></table></div>'
    +'<div class="cd"><div class="cdh"><h3>Absences</h3></div>'
    +'<table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>'

function showAbsModal(cls){
  const sts=DB.classes[cls]||[],sum={};
  sts.forEach(s=>{sum[s]={ab:0,lt:0,last:''}});
  Object.entries(AT[cls]||{}).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([d,day])=>{
    Object.entries(day).forEach(([s,v])=>{
      if(!sum[s])return;
      if(v==='absent'){sum[s].ab++;if(!sum[s].last)sum[s].last=d}
      if(v==='late')sum[s].lt++;
    });
  });
  const rows=sts.filter(s=>sum[s].ab>0||sum[s].lt>0).sort((a,b)=>(sum[b].ab+sum[b].lt)-(sum[a].ab+sum[a].lt)).map(s=>'<tr>'
    +'<td><div class="tf"><div class="av avp">'+ini(s)+'</div>'+s+'</div></td>'
    +'<td><span class="badge ba">'+sum[s].ab+'</span></td>'
    +'<td><span class="badge bl">'+sum[s].lt+'</span></td>'
    +'<td style="font-size:12px;color:var(--txt2)">'+(sum[s].last?fmtD(sum[s].last):'—')+'</td></tr>'

function cnLs(i){$('sr'+i).style.display='';$('se'+i).style.display='none'}
async function svLs(cls,wk,day,i){
  const s=$('ses'+i)?.value.trim(),t=$('set'+i)?.value.trim();if(!s)return;
  SC[cls][wk][day][i]={sub:s,teacher:t||''};
  sLoad('Saving...');await svSched();hLoad();flash();rfSc();
}
async function addLs(cls,wk,day){
  const s=$('scsb')?.value.trim(),t=$('sctc')?.value.trim();if(!s)return;
  if(!SC[cls])SC[cls]={};if(!SC[cls][wk])SC[cls][wk]={};if(!SC[cls][wk][day])SC[cls][wk][day]=[];
  SC[cls][wk][day].push({sub:s,teacher:t||''});
  sLoad('Saving...');await svSched();hLoad();flash();rfSc();
}
async function delLs(cls,wk,day,i){
  SC[cls][wk][day].splice(i,1);
  sLoad('Saving...');await svSched();hLoad();flash();rfSc();
}
async function mvU(cls,wk,day,i){
  if(i===0)return;const a=SC[cls][wk][day];[a[i-1],a[i]]=[a[i],a[i-1]];
  sLoad('Saving...');await svSched();hLoad();flash();rfSc();
}
async function mvD(cls,wk,day,i){
  const a=SC[cls][wk][day];if(i>=a.length-1)return;[a[i],a[i+1]]=[a[i+1],a[i]];
  sLoad('Saving...');await svSched();hLoad();flash();rfSc();
}
async function cpWk(){
  const cls=$('sccl')?.value,from=getScWk(),to=$('sccw')?.value;
  if(!to){alert('Select a target week');return}
  if(!confirm('Copy '+cls+' schedule from '+from+' to '+to+'?'))return;
  if(!SC[cls])SC[cls]={};
  SC[cls][to]=JSON.parse(JSON.stringify(SC[cls][from]||{}));
  sLoad('Saving...');await svSched();hLoad();flash();
}

// ── ADMIN PENDING ──
function buildAPend(){
  const pl=Object.entries(PE||{});
  return'<div class="pg" id="apend"><div class="pt">⏳ Pending</div><div class="ps">Students waiting for approval</div>'
    +(pl.length===0?'<p style="color:var(--txt3);padding:16px">No pending registrations.</p>':'')
    +pl.map(([email,data])=>'<div class="cd" style="margin-bottom:12px">'
      +'<div class="cdh"><div><b>'+email+'</b><span class="pb" style="margin-left:8px">Pending</span></div>'
      +'<div style="display:flex;gap:6px">'
      +'<button class="btn bp2" onclick="apprPend(\''+email+'\')">✓ Approve</button>'
      +'<button class="btn bd2" onclick="rejPend(\''+email+'\')">✗ Reject</button></div></div>'
      +'<div style="padding:11px 16px">'
      +(data.children||[]).map((c,ci)=>'<div style="display:flex;gap:12px;font-size:13px;padding:6px 0;border-bottom:1px solid var(--bdr);flex-wrap:wrap">'
        +'<span><b>'+c.name+'</b></span>'
        +'<span style="color:var(--txt2)">ID: '+c.publicId+'</span>'
        +'<span style="color:var(--txt2)">DOB: '+c.dob+'</span>'
        +'<span>Class: <select onchange="PE[\''+email+'\'].children['+ci+'].cls=this.value" style="padding:2px 6px;background:var(--surf2);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);font-size:12px;font-family:inherit">'
        +'<option value="">Select...</option>'+Object.keys(DB.classes||{}).map(cl=>'<option value="'+cl+'"'+(c.cls===cl?' selected':'')+'>'+cl+'</option>').join('')+'</select></span>'
        +'</div>'
      ).join('')+'</div></div>'
    ).join('')+'</div>';
}
function updPC(){const cnt=Object.keys(PE||{}).length;const e=$('pc');if(e)e.textContent=cnt>0?cnt:''}
async function apprPend(email){
  const data=PE[email];if(!data)return;
  const miss=(data.children||[]).filter(c=>!c.cls);
  if(miss.length){alert('Assign a class to all children first');return}
  DB.users[email]={role:'student',name:(data.children[0]?.name)||email,pass:data.pass,class:data.children[0]?.cls||'',children:data.children};
  delete PE[email];
  sLoad('Saving...');await svSchool();hLoad();flash();showPg('apend');
}
async function rejPend(email){
  if(!confirm('Reject '+email+'?'))return;
  delete PE[email];sLoad('Saving...');await svSchool();hLoad();flash();showPg('apend');
}

// ── THEMATIC PLAN ──
function buildTP(){
  const sjs=subjs();
  const cls=CU.classes||[];
  const n=new Date(),ay=curAY(),ms=getMonths(ay);
  const cm=n.getFullYear()+'-'+pad(n.getMonth()+1);
  return'<div class="pg" id="tp">'
    +'<div class="pt">📋 Thematic Plan</div><div class="ps">Annual lesson plan by class and subject</div>'
    +'<div class="sr" style="flex-wrap:wrap">'
    +'<label>Class:</label><select id="tpcl" onchange="rfTP()">'+cls.map(c=>'<option value="'+c+'">'+c+'</option>').join('')+'</select>'
    +(sjs.length>1?'<label>Subject:</label><select id="tpsj" onchange="rfTP()">'+sjs.map(s=>'<option value="'+s+'">'+s+'</option>').join('')+'</select>':'<input type="hidden" id="tpsj" value="'+esc2(sjs[0]||'')+'"/>')
    +'<label>Month:</label><select id="tpmo" onchange="rfTP()">'+ms.map(m=>'<option value="'+m.v+'"'+(m.v===cm?' selected':'')+'>'+m.l+'</option>').join('')+'</select>'
    +'</div>'
    +'<div id="tpc"></div>'
    +'<div style="margin-top:10px"><button class="btn bp2" onclick="svTP()">✓ Save Plan</button></div>'
    +'</div>';
}
function rfTP(){
  const cls=$('tpcl')?.value||'',sj=$('tpsj')?.value||'',mv=$('tpmo')?.value||'';
  const el=$('tpc');if(!el||!cls||!sj||!mv)return;
  const wks=getWeeks(mv);
  const DK={1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri'};
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DN=['Mon','Tue','Wed','Thu','Fri'];
  // Collect lesson days for this class+subject in this month
  const lessDays=[];
  wks.forEach(wk=>{
    wk.days.forEach(day=>{
      const dk=DK[day.getDay()];
      const ws=wkStart(day);
      const wsched=SC[cls]&&SC[cls][ws];
      const sched=(wsched&&wsched[dk])||(Array.isArray(SC[cls]&&SC[cls][dk])?SC[cls][dk]:[])||[];
      if(sched.some(l=>matchSubj(l.sub,sj)))lessDays.push(d2s(day));
    });
  });
  const tp=(window._tp=window._tp||{});
  const saved=(tp[CU.username]&&tp[CU.username][cls]&&tp[CU.username][cls][sj])||{};
  if(!lessDays.length){
    el.innerHTML='<p style="color:var(--txt3);padding:16px">No lessons scheduled for this subject in this month. Add lessons in Admin → Schedule first.</p>';
    return;
  }
  el.innerHTML='<div class="cd"><div style="overflow-x:auto"><table>'
    +'<thead><tr><th>Date</th><th>Topic</th><th>Goal</th><th>Homework</th></tr></thead><tbody>'
    +lessDays.map((ds,i)=>{
      const dt=new Date(ds);
      const lbl=DN[dt.getDay()-1]+' '+dt.getDate()+' '+MN[dt.getMonth()];
      const ent=saved[ds]||{};
      return'<tr><td style="font-size:12px;color:var(--txt2);white-space:nowrap">'+lbl+'</td>'
        +'<td><input id="tpt'+i+'" value="'+esc2(ent.topic||'')+'" data-ds="'+ds+'" style="width:100%;padding:5px 8px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-size:12px;font-family:inherit;outline:none" placeholder="Topic..."></td>'
        +'<td><input id="tpg'+i+'" value="'+esc2(ent.goal||'')+'" data-ds="'+ds+'" style="width:100%;padding:5px 8px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-size:12px;font-family:inherit;outline:none" placeholder="Goal..."></td>'
        +'<td><input id="tph'+i+'" value="'+esc2(ent.homework||'')+'" data-ds="'+ds+'" style="width:100%;padding:5px 8px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-size:12px;font-family:inherit;outline:none" placeholder="Homework..."></td>'
        +'</tr>';
    }).join('')+'</tbody></table></div></div>';
  window._tpDays=lessDays;
}
async function svTP(){
  const cls=$('tpcl')?.value||'',sj=$('tpsj')?.value||'';
  const days=window._tpDays||[];
  if(!cls||!sj||!days.length)return;
  if(!window._tp)window._tp={};
  if(!window._tp[CU.username])window._tp[CU.username]={};
  if(!window._tp[CU.username][cls])window._tp[CU.username][cls]={};
  if(!window._tp[CU.username][cls][sj])window._tp[CU.username][cls][sj]={};
  days.forEach((ds,i)=>{
    const t=$('tpt'+i)?.value||'',g=$('tpg'+i)?.value||'',h=$('tph'+i)?.value||'';
    window._tp[CU.username][cls][sj][ds]={topic:t,goal:g,homework:h};
  });
  // Save in grades bin
  const gData=await bGet(BG).catch(()=>({}));
  gData.thematic=window._tp;
  sLoad('Saving...');await bSet(BG,gData);hLoad();flash();
}

// ── EDIT GRADE INLINE (in modal) ──
function editGradeInline(cls,st,sj,dk,curG,el){
  const isAdm=CU.role==='admin';
  const mySubj=subjs().some(s=>matchSubj(sj,s));
  if(!isAdm&&!mySubj){alert('You can only edit grades for your own subjects');return}
  const nv=prompt('Edit grade for '+st+' ('+sj+', '+fmtD(dk)+')\nCurrent: '+curG+'\nEnter 1-10 or leave empty to delete:',curG);
  if(nv===null)return;
  const n=parseInt(nv);
  if(!GR[cls])GR[cls]={};
  if(!GR[cls][st])GR[cls][st]={};
  if(!GR[cls][st][sj])GR[cls][st][sj]={};
  if(nv.trim()===''||isNaN(n)){
    delete GR[cls][st][sj][dk];
    el.closest('span').remove();
  }else if(n>=1&&n<=10){
    GR[cls][st][sj][dk]=n;
    el.className='badge b'+n;el.textContent=n;
  }else{alert('Grade must be 1-10');return}
  svGrades().then(flash);
}

// ── ADMIN ADD PARENT ──

function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function esc2(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

(async()=>{await loadAll()})();
